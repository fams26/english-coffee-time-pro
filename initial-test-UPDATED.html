<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Ubicación - English Coffee Time</title>
    <style>
        :root {
            --primary: #2C5282;
            --accent: #D4AF37;
            --bg: #F8F7F3;
            --text-dark: #1F2937;
            --text-light: #6B7280;
            --success: #10B981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .navbar h1 {
            color: var(--primary);
            font-size: 24px;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .progress-section {
            margin-bottom: 2rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.3s;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
        }

        .options {
            display: grid;
            gap: 1rem;
        }

        .option {
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .option:hover {
            border-color: var(--primary);
            background: rgba(44, 82, 130, 0.05);
        }

        .option input[type="radio"] {
            margin-right: 0.5rem;
            cursor: pointer;
        }

        .option.selected {
            border-color: var(--primary);
            background: rgba(44, 82, 130, 0.1);
        }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        button {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-next {
            background: var(--primary);
            color: white;
        }

        .btn-next:hover {
            background: #1e3a5f;
        }

        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-prev {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-prev:hover {
            background: rgba(44, 82, 130, 0.05);
        }

        /* RESULTADO */
        .result-container {
            display: none;
            text-align: center;
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .result-container.show {
            display: block;
        }

        .result-icon {
            font-size: 64px;
            margin-bottom: 1rem;
        }

        .result-level {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
            margin: 1rem 0;
        }

        .result-description {
            color: var(--text-light);
            font-size: 16px;
            margin-bottom: 2rem;
        }

        .level-details {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: left;
        }

        .level-details h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .level-details p {
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.6;
        }

        .btn-continue {
            background: var(--success);
            color: white;
            padding: 1rem 2rem;
            font-size: 18px;
        }

        .btn-continue:hover {
            background: #059669;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid var(--bg);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>☕ English Coffee Time - Test de Ubicación</h1>
</div>

<div class="container">
    <!-- TEST SECTION -->
    <div id="testSection">
        <!-- Progress Bar -->
        <div class="progress-section">
            <p style="margin-bottom: 0.5rem; color: var(--text-light); font-size: 14px;">
                Pregunta <span id="currentQuestion">1</span> de 30
            </p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="question-card">
            <div class="question-text" id="questionText">Cargando pregunta...</div>
            <div class="options" id="optionsContainer">
                <!-- Opciones se llenan con JavaScript -->
            </div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button class="btn-prev" id="prevBtn" onclick="previousQuestion()" style="display: none;">
                ← Anterior
            </button>
            <button class="btn-next" id="nextBtn" onclick="nextQuestion()" disabled>
                Siguiente →
            </button>
        </div>
    </div>

    <!-- RESULT SECTION -->
    <div id="resultSection" class="result-container">
        <div class="result-icon">🎉</div>
        <h2>¡Test Completado!</h2>
        <div class="result-level" id="resultLevel">-</div>
        <p class="result-description" id="resultDescription">-</p>
        
        <div class="level-details">
            <h3 id="levelName">-</h3>
            <p id="levelDescription">-</p>
        </div>

        <div class="loading" id="savingIndicator" style="display: none;">
            <div class="spinner"></div>
            <p>Guardando tu nivel...</p>
        </div>

        <button class="btn-continue" id="continueBtn" onclick="goToDashboard()" style="display: none;">
            Ir a Módulos de Mi Nivel →
        </button>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>

<script>
    // PREGUNTAS DEL TEST (30 preguntas)
    const questions = [
        // A1 (0-5)
        { q: "I ___ from Spain", o: ["am", "is", "are", "be"], c: 0 },
        { q: "She ___ a teacher", o: ["am", "is", "are", "be"], c: 1 },
        { q: "What is your name? - ___ John", o: ["I am", "You are", "He is", "It is"], c: 0 },
        { q: "They ___ students", o: ["am", "is", "are", "be"], c: 2 },
        { q: "___ you speak English?", o: ["Do", "Does", "Did", "Will"], c: 0 },
        { q: "I like ___", o: ["to swimming", "swimming", "to swim", "swim"], c: 1 },

        // A2 (6-15)
        { q: "She has ___ the book", o: ["read", "reads", "reading", "to read"], c: 0 },
        { q: "They ___ to the beach yesterday", o: ["go", "goes", "went", "going"], c: 2 },
        { q: "I would like ___ coffee", o: ["a", "an", "the", "some"], c: 3 },
        { q: "If I ___ you, I would help", o: ["was", "were", "am", "be"], c: 1 },
        { q: "Despite ___ tired, she continued", o: ["being", "be", "is", "was"], c: 0 },
        { q: "The meeting ___ until 3 PM", o: ["lasts", "lasted", "will last", "has lasted"], c: 2 },
        { q: "I would rather ___ at home", o: ["stay", "to stay", "staying", "stayed"], c: 0 },
        { q: "He's been working ___", o: ["hardly for two hours", "for hardly two hours", "hardly two hours", "two hours hardly"], c: 0 },
        { q: "She's not only intelligent ___ also creative", o: ["but", "and", "or", "nor"], c: 0 },

        // B1 (16-23)
        { q: "I ___ this project for 3 hours", o: ["have worked", "have been working", "am working", "worked"], c: 1 },
        { q: "The economic crisis ___ by several factors", o: ["was caused", "caused", "has caused", "was causing"], c: 0 },
        { q: "Her argument ___ as convincing", o: ["was regarded", "regarded", "was regarding", "regarding"], c: 0 },
        { q: "What ___ if you had more time?", o: ["would you do", "you would do", "will you do", "you do"], c: 0 },
        { q: "The policy has been ___", o: ["implemented", "implementing", "implement", "to implement"], c: 0 },

        // B1+ (24-27)
        { q: "Unless you ___ harder, you won't succeed", o: ["work", "worked", "will work", "would work"], c: 0 },
        { q: "Had I known, I ___ differently", o: ["would have acted", "would act", "acted", "will act"], c: 0 },
        { q: "Not only ___ intelligent, but also kind", o: ["is she", "she is", "she was", "is intelligent"], c: 0 },
        { q: "The more you practice, ___ you become", o: ["the better", "better", "the best", "best"], c: 0 },

        // B2+ (28-29)
        { q: "His argument was couched in ___ language", o: ["ambiguous", "ambiguity", "ambiguously", "ambiguousness"], c: 0 },
        { q: "The phenomenon ___ considerable scholarly attention", o: ["has engendered", "has been engendered", "engenders", "has engendering"], c: 0 }
    ];

    // DESCRIPCIONES DE NIVELES
    const levelDescriptions = {
        'A1': {
            name: 'Nivel A1 - Principiante',
            desc: 'Puedes usar frases simples y cotidianas. Entiendes palabras básicas y expresiones familiares.'
        },
        'A2': {
            name: 'Nivel A2 - Elemental',
            desc: 'Puedes comunicarte en tareas simples. Entiendes el tema general de conversaciones cotidianas.'
        },
        'B1': {
            name: 'Nivel B1 - Intermedio',
            desc: 'Puedes mantener conversaciones sobre temas que te interesan. Comprendes lo esencial de discusiones claras.'
        },
        'B1+': {
            name: 'Nivel B1+ - Intermedio Avanzado',
            desc: 'Puedes expresarte con relativa fluidez. Comprendes discursos complejos sobre temas variados.'
        },
        'B2': {
            name: 'Nivel B2 - Intermedio Alto',
            desc: 'Puedes discutir temas complejos y expresar opiniones. Comprendes argumentos principales en textos complejos.'
        },
        'C1': {
            name: 'Nivel C1 - Avanzado',
            desc: 'Puedes expresarte con fluidez y espontaneidad. Comprendes textos largos y exigentes.'
        },
        'C2': {
            name: 'Nivel C2 - Dominio',
            desc: 'Dominas prácticamente todos los aspectos del idioma. Te expresas con precisión y matices.'
        }
    };

    let currentQuestion = 0;
    let answers = new Array(30).fill(null);
    let currentUser = null;

    // Inicializar
    document.addEventListener('DOMContentLoaded', async () => {
        currentUser = await supabaseGetCurrentUser();
        if (!currentUser) {
            window.location.href = 'signin.html';
            return;
        }

        loadQuestion(0);
    });

    function loadQuestion(index) {
        currentQuestion = index;
        const question = questions[index];

        document.getElementById('currentQuestion').textContent = index + 1;
        document.getElementById('questionText').textContent = question.q;

        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';

        question.o.forEach((option, i) => {
            const div = document.createElement('div');
            div.className = 'option' + (answers[index] === i ? ' selected' : '');
            div.innerHTML = `
                <label style="display: flex; align-items: center; cursor: pointer; margin: 0;">
                    <input type="radio" name="answer" value="${i}" 
                        ${answers[index] === i ? 'checked' : ''} 
                        onchange="selectAnswer(${i})">
                    <span>${option}</span>
                </label>
            `;
            optionsContainer.appendChild(div);
        });

        // Actualizar barra de progreso
        const progress = ((index + 1) / 30) * 100;
        document.getElementById('progressFill').style.width = progress + '%';

        // Botones
        document.getElementById('prevBtn').style.display = index > 0 ? 'block' : 'none';
        document.getElementById('nextBtn').disabled = answers[index] === null;
        document.getElementById('nextBtn').textContent = index === 29 ? 'Completar Test' : 'Siguiente →';
    }

    function selectAnswer(i) {
        answers[currentQuestion] = i;
        document.querySelectorAll('.option').forEach((opt, idx) => {
            opt.classList.toggle('selected', idx === i);
        });
        document.getElementById('nextBtn').disabled = false;
    }

    function previousQuestion() {
        if (currentQuestion > 0) {
            loadQuestion(currentQuestion - 1);
        }
    }

    function nextQuestion() {
        if (currentQuestion < 29) {
            loadQuestion(currentQuestion + 1);
        } else {
            completeTest();
        }
    }

    // CALCULAR NIVEL
    function calculateLevel() {
        let score = 0;
        answers.forEach((answer, index) => {
            if (answer === questions[index].c) {
                score++;
            }
        });

        // Score = 0-30
        // A1: 0-5, A2: 6-15, B1: 16-23, B1+: 24-27, B2+: 28-30
        if (score <= 5) return 'A1';
        if (score <= 15) return 'A2';
        if (score <= 23) return 'B1';
        if (score <= 27) return 'B1+';
        if (score <= 29) return 'B2';
        return 'C1';
    }

    // COMPLETAR TEST
    async function completeTest() {
        const nivel = calculateLevel();
        const score = answers.filter((a, i) => a === questions[i].c).length;

        // Mostrar resultado
        showResult(nivel);

        // Guardar en BD
        await saveTestResult(nivel, score);
    }

    function showResult(nivel) {
        const info = levelDescriptions[nivel];
        document.getElementById('testSection').style.display = 'none';
        document.getElementById('resultSection').classList.add('show');
        document.getElementById('resultLevel').textContent = nivel;
        document.getElementById('levelName').textContent = info.name;
        document.getElementById('levelDescription').textContent = info.desc;
        document.getElementById('resultDescription').textContent = 'Tu nivel ha sido determinado. Ahora puedes comenzar a aprender.';
    }

    // GUARDAR EN BD
    async function saveTestResult(nivel, score) {
        document.getElementById('savingIndicator').style.display = 'block';

        try {
            // Guardar test
            await saveinitialTest(currentUser.id, nivel, score);

            // Actualizar usuario con el nivel
            const { error } = await supabaseClient
                .from('users')
                .update({ nivel: nivel })
                .eq('id', currentUser.id);

            if (error) throw error;

            console.log('✅ Nivel guardado:', nivel);

            // Mostrar botón
            document.getElementById('savingIndicator').style.display = 'none';
            document.getElementById('continueBtn').style.display = 'block';
        } catch (error) {
            console.error('❌ Error guardando:', error);
            document.getElementById('savingIndicator').innerHTML = '<p>Error al guardar. Intenta de nuevo.</p>';
        }
    }

    // IR AL DASHBOARD
    function goToDashboard() {
        window.location.href = 'dashboard-student.html';
    }
</script>

</body>
</html>
