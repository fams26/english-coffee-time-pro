<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - English Coffee Time</title>
    <style>
        :root {
            --primary: #2C5282;
            --accent: #D4AF37;
            --bg: #F8F7F3;
            --text-dark: #1F2937;
            --text-light: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            display: flex;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
        }

        .left {
            background: linear-gradient(135deg, var(--primary) 0%, #1e3a5f 100%);
            color: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .left h1 {
            font-size: 36px;
            margin-bottom: 1rem;
        }

        .left p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .benefits {
            text-align: left;
        }

        .benefit {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .benefit-icon {
            font-size: 24px;
        }

        .benefit-text {
            font-size: 14px;
        }

        .right {
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .form-container p {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(44, 82, 130, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .checkbox-group input {
            margin-top: 0.25rem;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 12px;
            color: var(--text-light);
            margin: 0;
            cursor: pointer;
        }

        .checkbox-group a {
            color: var(--primary);
            text-decoration: none;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-submit:hover {
            background: #1e3a5f;
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 14px;
            color: var(--text-light);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .role-btn {
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .role-btn.selected {
            border-color: var(--primary);
            background: rgba(44, 82, 130, 0.05);
            color: var(--primary);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 13px;
            display: none;
        }

        .success {
            background: #dcfce7;
            color: #15803d;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 13px;
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .left {
                display: none;
            }

            .right {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- LEFT SIDE -->
    <div class="left">
        <div>
            <h1>Aprende Inglés</h1>
            <p>Únete a nuestra comunidad educativa de aprendices de inglés</p>
            
            <div class="benefits">
                <div class="benefit">
                    <div class="benefit-icon">✓</div>
                    <div class="benefit-text">Test de ubicación gratuito</div>
                </div>
                <div class="benefit">
                    <div class="benefit-icon">✓</div>
                    <div class="benefit-text">6 niveles estructurados</div>
                </div>
                <div class="benefit">
                    <div class="benefit-icon">✓</div>
                    <div class="benefit-text">Recursos educativos enlazados</div>
                </div>
                <div class="benefit">
                    <div class="benefit-icon">✓</div>
                    <div class="benefit-text">Seguimiento de progreso</div>
                </div>
                <div class="benefit">
                    <div class="benefit-icon">✓</div>
                    <div class="benefit-text">100% gratuito</div>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="form-container">
            <h2>Crear Cuenta</h2>
            <p>Comienza tu viaje en inglés hoy</p>

            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label>¿Eres estudiante o profesor?</label>
                    <div class="role-selector">
                        <button type="button" class="role-btn selected" data-role="student" onclick="selectRole('student')">
                            👨‍🎓 Estudiante
                        </button>
                        <button type="button" class="role-btn" data-role="teacher" onclick="selectRole('teacher')">
                            👨‍🏫 Profesor
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" required placeholder="Tu nombre">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">Acepto los <a href="#" target="_blank">términos de servicio</a> y <a href="#" target="_blank">política de privacidad</a></label>
                </div>

                <button type="submit" class="btn-submit">Crear Cuenta</button>
            </form>

            <div class="login-link">
                ¿Ya tienes cuenta? <a href="signin.html">Inicia Sesión</a>
            </div>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script>
    let selectedRole = 'student';

    function selectRole(role) {
        selectedRole = role;
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.classList.remove('selected');
        });
        document.querySelector(`[data-role="${role}"]`).classList.add('selected');
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.querySelector('.btn-submit');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (password.length < 6) {
            showError('La contraseña debe tener al menos 6 caracteres');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creando cuenta...';

        try {
            // Simular registro (en producción usar Supabase)
            await new Promise(resolve => setTimeout(resolve, 1500));

            // Guardar en localStorage
            const user = {
                id: 'user_' + Date.now(),
                name: name,
                email: email,
                role: selectedRole,
                created_at: new Date().toISOString(),
                nivel: null // Se asignará después del test
            };

            localStorage.setItem('user', JSON.stringify(user));
            
            showSuccess('¡Cuenta creada! Redirigiendo...');
            
            setTimeout(() => {
                if (selectedRole === 'student') {
                    window.location.href = 'app/initial-test.html';
                } else {
                    window.location.href = 'app/dashboard-teacher.html';
                }
            }, 2000);

        } catch (error) {
            showError(error.message || 'Error al crear cuenta');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Crear Cuenta';
        }
    });

    function showError(msg) {
        document.getElementById('errorMsg').textContent = msg;
        document.getElementById('errorMsg').style.display = 'block';
    }

    function showSuccess(msg) {
        document.getElementById('successMsg').textContent = msg;
        document.getElementById('successMsg').style.display = 'block';
    }
</script>

</body>
</html>
