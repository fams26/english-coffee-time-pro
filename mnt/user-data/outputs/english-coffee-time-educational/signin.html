<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - English Coffee Time</title>
    <style>
        :root {
            --primary: #2C5282;
            --accent: #D4AF37;
            --bg: #F8F7F3;
            --text-dark: #1F2937;
            --text-light: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            display: flex;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
        }

        .left {
            background: linear-gradient(135deg, var(--primary) 0%, #1e3a5f 100%);
            color: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .left h1 {
            font-size: 36px;
            margin-bottom: 1rem;
        }

        .left p {
            font-size: 16px;
            opacity: 0.9;
        }

        .right {
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .form-container p {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(44, 82, 130, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 13px;
        }

        .remember-forgot a {
            color: var(--primary);
            text-decoration: none;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-submit:hover {
            background: #1e3a5f;
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 14px;
            color: var(--text-light);
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 13px;
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .left {
                display: none;
            }

            .right {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- LEFT SIDE -->
    <div class="left">
        <div>
            <h1>Bienvenido de Vuelta</h1>
            <p>Continúa con tu aprendizaje de inglés donde lo dejaste</p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="form-container">
            <h2>Iniciar Sesión</h2>
            <p>Accede a tu cuenta</p>

            <div class="error" id="errorMsg"></div>

            <form id="signinForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <div class="remember-forgot">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="remember"> Recuérdame
                    </label>
                    <a href="#">¿Olvidaste contraseña?</a>
                </div>

                <button type="submit" class="btn-submit">Iniciar Sesión</button>
            </form>

            <div class="signup-link">
                ¿No tienes cuenta? <a href="signup.html">Crear una ahora</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('signinForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.querySelector('.btn-submit');

        errorMsg.style.display = 'none';

        try {
            submitBtn.disabled = true;
            submitBtn.textContent = 'Iniciando sesión...';
            
            await new Promise(resolve => setTimeout(resolve, 1000));

            // Buscar usuario en localStorage
            const users = JSON.parse(localStorage.getItem('allUsers') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                throw new Error('Correo o contraseña incorrectos');
            }

            localStorage.setItem('user', JSON.stringify(user));

            // Redirigir según rol
            if (user.role === 'student') {
                window.location.href = 'app/dashboard-student.html';
            } else {
                window.location.href = 'app/dashboard-teacher.html';
            }

        } catch (error) {
            errorMsg.textContent = error.message;
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Iniciar Sesión';
        }
    });
</script>

</body>
</html>
