<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - English Coffee Time</title>
    <style>
        :root {
            --primary: #2C5282;
            --accent: #D4AF37;
            --bg: #F8F7F3;
            --text-dark: #1F2937;
            --text-light: #6B7280;
            --success: #10B981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-dark);
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: var(--primary);
            font-size: 24px;
        }

        .navbar button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .header-section h2 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .user-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .info-card {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
        }

        .info-label {
            color: var(--text-light);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .info-value {
            color: var(--primary);
            font-size: 24px;
            font-weight: 700;
        }

        .modules-section {
            margin-bottom: 2rem;
        }

        .modules-section h3 {
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-size: 20px;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .module-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .module-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .module-icon {
            font-size: 40px;
            margin-bottom: 1rem;
        }

        .module-card h4 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 16px;
        }

        .module-card p {
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-light);
        }

        .module-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 1rem;
        }

        .module-btn:hover {
            background: #1e3a5f;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid var(--bg);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
        }

        .empty-state h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .modules-grid {
                grid-template-columns: 1fr;
            }

            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>☕ English Coffee Time</h1>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">
    <!-- HEADER: Info del estudiante -->
    <div class="header-section">
        <h2>Bienvenido, <span id="studentName">Usuario</span></h2>
        <div class="user-info">
            <div class="info-card">
                <div class="info-label">Tu Nivel</div>
                <div class="info-value" id="studentLevel">-</div>
            </div>
            <div class="info-card">
                <div class="info-label">Temas Completados</div>
                <div class="info-value" id="completedTopics">0</div>
            </div>
            <div class="info-card">
                <div class="info-label">Promedio</div>
                <div class="info-value" id="averageScore">0%</div>
            </div>
        </div>
    </div>

    <!-- MÓDULOS DEL NIVEL -->
    <div class="modules-section">
        <h3>Módulos de tu Nivel</h3>
        <div class="modules-grid" id="modulesGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando módulos...</p>
            </div>
        </div>
    </div>

    <!-- PRÓXIMOS TEMAS -->
    <div class="modules-section">
        <h3>Próximos Temas Recomendados</h3>
        <div id="recommendedTopics">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando temas recomendados...</p>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/modules-functions.js"></script>

<script>
    let currentUser = null;

    // Inicializar
    document.addEventListener('DOMContentLoaded', async () => {
        currentUser = await supabaseGetCurrentUser();
        if (!currentUser) {
            window.location.href = 'signin.html';
            return;
        }

        // Cargar información
        await loadStudentInfo();
        await loadModulesForLevel();
        await loadRecommendedTopics();
    });

    // CARGAR INFO DEL ESTUDIANTE
    async function loadStudentInfo() {
        try {
            document.getElementById('studentName').textContent = currentUser.name || 'Usuario';
            document.getElementById('studentLevel').textContent = currentUser.nivel || 'No asignado';

            // Obtener estadísticas
            const stats = await getStudentStats(currentUser.id);
            if (stats.success) {
                document.getElementById('completedTopics').textContent = stats.temasCompletados;
                document.getElementById('averageScore').textContent = stats.promedioPuntos + '%';
            }
        } catch (error) {
            console.error('Error cargando info:', error);
        }
    }

    // CARGAR MÓDULOS DEL NIVEL
    async function loadModulesForLevel() {
        const grid = document.getElementById('modulesGrid');

        if (!currentUser.nivel) {
            grid.innerHTML = '<div class="empty-state"><h3>No tienes nivel asignado</h3><p>Completa el test de ubicación primero</p></div>';
            return;
        }

        try {
            const result = await getModulesByLevel(currentUser.nivel);
            
            if (!result.success || !result.data || result.data.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No hay módulos disponibles</h3></div>';
                return;
            }

            grid.innerHTML = '';

            const moduleIcons = {
                'reading': '📖',
                'grammar': '📝',
                'vocabulary': '📚',
                'listening': '🎧',
                'writing': '✍️',
                'speaking': '🗣️'
            };

            for (const module of result.data) {
                // Obtener progreso del módulo
                const progressResult = await getModuleProgress(currentUser.id, module.id);
                const progress = progressResult.success ? progressResult.percentage : 0;

                const card = document.createElement('div');
                card.className = 'module-card';
                card.innerHTML = `
                    <div class="module-icon">${moduleIcons[module.module_type] || '📚'}</div>
                    <h4>${module.nombre}</h4>
                    <p>${module.descripcion}</p>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="progress-text">${progress}% completo</div>
                    <button class="module-btn" onclick="goToModule('${module.id}', '${module.nombre}')">
                        Ver Temas
                    </button>
                `;
                grid.appendChild(card);
            }
        } catch (error) {
            console.error('Error cargando módulos:', error);
            grid.innerHTML = '<div class="empty-state"><h3>Error al cargar módulos</h3></div>';
        }
    }

    // CARGAR TEMAS RECOMENDADOS
    async function loadRecommendedTopics() {
        const container = document.getElementById('recommendedTopics');

        if (!currentUser.nivel) {
            container.innerHTML = '<div class="empty-state"><p>Completa el test para ver temas recomendados</p></div>';
            return;
        }

        try {
            const result = await getRecommendedTopics(currentUser.id, currentUser.nivel, 5);
            
            if (!result.success || !result.data || result.data.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>¡Felicidades! Has completado todos los temas de tu nivel</p></div>';
                return;
            }

            container.innerHTML = '';
            
            result.data.forEach((topic) => {
                const div = document.createElement('div');
                div.style.cssText = 'background: white; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;';
                div.innerHTML = `
                    <div>
                        <h4 style="color: var(--primary); margin-bottom: 0.5rem;">${topic.titulo}</h4>
                        <p style="color: var(--text-light); font-size: 13px;">${topic.descripcion}</p>
                        <p style="color: var(--text-light); font-size: 12px; margin-top: 0.5rem;">⏱️ ${topic.tiempo_estimado} min</p>
                    </div>
                    <button class="module-btn" style="width: auto; margin-left: 1rem;" onclick="goToTopic('${topic.id}')">
                        Empezar
                    </button>
                `;
                container.appendChild(div);
            });
        } catch (error) {
            console.error('Error cargando temas recomendados:', error);
        }
    }

    // IR A UN MÓDULO
    function goToModule(moduleId, moduleName) {
        window.location.href = `modules-dashboard.html?module=${moduleId}&name=${encodeURIComponent(moduleName)}`;
    }

    // IR A UN TEMA
    function goToTopic(topicId) {
        window.location.href = `topic-viewer.html?id=${topicId}`;
    }

    // LOGOUT
    async function logout() {
        await supabaseSignOut();
        window.location.href = 'signin.html';
    }
</script>

</body>
</html>
