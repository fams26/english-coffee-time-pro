<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - English Coffee Time</title>
    <style>
        :root {
            --primary: #2C5282;
            --accent: #D4AF37;
            --bg: #F8F7F3;
            --text-dark: #1F2937;
            --text-light: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-dark);
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: var(--primary);
            font-size: 24px;
        }

        .navbar button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .header-section h2 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .user-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .info-card {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
        }

        .info-label {
            color: var(--text-light);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .info-value {
            color: var(--primary);
            font-size: 24px;
            font-weight: 700;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .module-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .module-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .module-icon {
            font-size: 40px;
            margin-bottom: 1rem;
        }

        .module-card h4 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 16px;
        }

        .module-card p {
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .module-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        .module-btn:hover {
            background: #1e3a5f;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid var(--bg);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .modules-grid {
                grid-template-columns: 1fr;
            }

            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>☕ English Coffee Time</h1>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">
    <!-- HEADER -->
    <div class="header-section">
        <h2>Bienvenido, <span id="studentName">Usuario</span></h2>
        <div class="user-info">
            <div class="info-card">
                <div class="info-label">Tu Nivel</div>
                <div class="info-value" id="studentLevel">-</div>
            </div>
            <div class="info-card">
                <div class="info-label">Temas Completados</div>
                <div class="info-value" id="completedTopics">0</div>
            </div>
            <div class="info-card">
                <div class="info-label">Promedio</div>
                <div class="info-value" id="averageScore">0%</div>
            </div>
        </div>
    </div>

    <!-- MÓDULOS -->
    <div id="modulesSection">
        <div class="loading">
            <div class="spinner"></div>
            <p>Cargando módulos...</p>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/modules-functions.js"></script>

<script>
    let currentUser = null;

    // Inicializar
    document.addEventListener('DOMContentLoaded', async () => {
        console.log('📄 Dashboard cargando...');
        
        currentUser = await supabaseGetCurrentUser();
        console.log('👤 Usuario:', currentUser);
        
        if (!currentUser) {
            console.log('❌ No hay sesión, redirigiendo...');
            window.location.href = '../signin.html';
            return;
        }

        await loadStudentInfo();
        await loadModules();
    });

    // CARGAR INFO DEL ESTUDIANTE
    async function loadStudentInfo() {
        console.log('📊 Cargando info del estudiante...');
        
        document.getElementById('studentName').textContent = currentUser.name || currentUser.email || 'Usuario';
        document.getElementById('studentLevel').textContent = currentUser.nivel || 'No asignado';

        // Intentar cargar estadísticas
        try {
            if (window.getStudentStats) {
                const stats = await getStudentStats(currentUser.id);
                if (stats.success) {
                    document.getElementById('completedTopics').textContent = stats.temasCompletados || 0;
                    document.getElementById('averageScore').textContent = (stats.promedioPuntos || 0) + '%';
                }
            }
        } catch (error) {
            console.warn('⚠️ Error cargando stats:', error);
        }
    }

    // CARGAR MÓDULOS
    async function loadModules() {
        console.log('📚 Cargando módulos...');
        
        if (!currentUser.nivel) {
            document.getElementById('modulesSection').innerHTML = 
                '<div style="text-align: center; padding: 2rem; background: white; border-radius: 12px;">Necesitas completar el test de ubicación primero</div>';
            return;
        }

        try {
            // Obtener módulos del nivel
            const modules = await getModulesByLevel(currentUser.nivel);
            
            if (!modules.success || !modules.data || modules.data.length === 0) {
                document.getElementById('modulesSection').innerHTML = 
                    '<div style="text-align: center; padding: 2rem; background: white; border-radius: 12px;">No hay módulos disponibles</div>';
                return;
            }

            const moduleIcons = {
                'reading': '📖',
                'grammar': '📝',
                'vocabulary': '📚',
                'listening': '🎧',
                'writing': '✍️',
                'speaking': '🗣️'
            };

            let html = '<h3 style="margin-bottom: 1.5rem; color: var(--primary);">Módulos de tu Nivel</h3>';
            html += '<div class="modules-grid">';

            for (const module of modules.data) {
                const progress = await getModuleProgress(currentUser.id, module.id);
                const progressPercent = progress.success ? progress.percentage : 0;

                html += `
                    <div class="module-card">
                        <div class="module-icon">${moduleIcons[module.module_type] || '📚'}</div>
                        <h4>${module.nombre}</h4>
                        <p>${module.descripcion}</p>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                        <div class="progress-text">${progressPercent}% completo</div>
                        <button class="module-btn" onclick="goToModule('${module.id}', '${module.nombre}')">
                            Ver Temas
                        </button>
                    </div>
                `;
            }

            html += '</div>';
            document.getElementById('modulesSection').innerHTML = html;
            console.log('✅ Módulos cargados');

        } catch (error) {
            console.error('❌ Error cargando módulos:', error);
            document.getElementById('modulesSection').innerHTML = 
                '<div style="text-align: center; padding: 2rem; color: red;">Error cargando módulos</div>';
        }
    }

    // IR A MÓDULO
    function goToModule(moduleId, moduleName) {
        window.location.href = `modules-dashboard.html?module=${moduleId}&name=${encodeURIComponent(moduleName)}&level=${currentUser.nivel}`;
    }

    // LOGOUT
    async function logout() {
        await supabaseSignOut();
        window.location.href = '../signin.html';
    }
</script>

</body>
</html>
