<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Nivel - English Coffee Time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #667BC6;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #7f8c8d;
        }

        .question-container {
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.1rem;
            color: #2c3e50;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #ecf0f1;
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: #667BC6;
            background: #f0f2ff;
        }

        .option input[type="radio"] {
            margin-right: 0.5rem;
        }

        .progress-bar {
            background: #ecf0f1;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667BC6 0%, #45B7D1 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 0.9rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            color: white;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ecf0f1;
            border-top: 4px solid #667BC6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .success {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>☕ Prueba de Nivel</h1>
        <p>Responde estas preguntas para determinar tu nivel de inglés</p>
    </div>

    <div id="testContainer" style="display: none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%;"></div>
        </div>

        <div id="questionContent"></div>

        <div class="button-group">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()" style="display: none;">← Atrás</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>

    <div id="loadingScreen" class="loading">
        <div class="spinner"></div>
        <p>Cargando prueba...</p>
    </div>

    <div id="resultsScreen" style="display: none;">
        <div class="success">
            <h2 style="margin-bottom: 1rem;">✅ Prueba completada</h2>
            <p>Tu nivel estimado: <strong id="estimatedLevel">B1</strong></p>
            <p style="margin-top: 1rem; color: #2c3e50;">Redirigiendo al dashboard...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>

<script>
    console.log('✅ initial-test.html cargado');

    // Preguntas de ejemplo (debería venir de BD)
    const questions = [
        {
            text: "¿Cuál es el significado de 'Hello'?",
            options: ["Adiós", "Hola", "Gracias", "Por favor"],
            correct: 1,
            level: "A1"
        },
        {
            text: "Completa: 'I ___ a student'",
            options: ["am", "is", "are", "be"],
            correct: 0,
            level: "A1"
        },
        {
            text: "¿Cuál es el gerundio de 'run'?",
            options: ["running", "runned", "runing", "runs"],
            correct: 0,
            level: "A2"
        },
        {
            text: "Elige el verbo correcto: 'If I ___ money, I would travel'",
            options: ["have", "had", "would have", "will have"],
            correct: 1,
            level: "B1"
        },
        {
            text: "¿Cuál es la voz pasiva de 'They build houses'?",
            options: ["Houses are built by them", "Houses are build by them", "Houses build by them", "Houses is built by them"],
            correct: 0,
            level: "B2"
        }
    ];

    let currentQuestion = 0;
    let answers = [];
    let currentUser = null;

    async function init() {
        try {
            const isAuth = await supabaseIsAuthenticated();
            if (!isAuth) {
                window.location.href = 'signin.html';
                return;
            }

            currentUser = await supabaseGetCurrentUser();
            if (!currentUser) {
                window.location.href = 'signin.html';
                return;
            }

            console.log('👤 Usuario:', currentUser.email);

            loadTest();
        } catch (error) {
            console.error('❌ Error:', error);
            document.getElementById('loadingScreen').innerHTML = '<div class="error">Error: ' + error.message + '</div>';
        }
    }

    function loadTest() {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('testContainer').style.display = 'block';
        answers = new Array(questions.length).fill(null);
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQuestion];
        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = progress + '%';

        let html = `
            <div class="question-container">
                <div style="color: #7f8c8d; margin-bottom: 1rem;">
                    Pregunta ${currentQuestion + 1} de ${questions.length}
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options">
        `;

        q.options.forEach((opt, idx) => {
            html += `
                <label class="option">
                    <input type="radio" name="answer" value="${idx}" 
                        ${answers[currentQuestion] === idx ? 'checked' : ''}>
                    ${opt}
                </label>
            `;
        });

        html += `</div></div>`;
        document.getElementById('questionContent').innerHTML = html;

        document.getElementById('prevBtn').style.display = currentQuestion > 0 ? 'block' : 'none';
        document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? 'Terminar' : 'Siguiente →';

        // Guardar respuesta
        document.querySelectorAll('input[name="answer"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                answers[currentQuestion] = parseInt(e.target.value);
            });
        });
    }

    function nextQuestion() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            showQuestion();
        } else {
            finishTest();
        }
    }

    function previousQuestion() {
        if (currentQuestion > 0) {
            currentQuestion--;
            showQuestion();
        }
    }

    async function finishTest() {
        console.log('✅ Test completado. Respuestas:', answers);

        // Calcular nivel
        let correctCount = 0;
        answers.forEach((ans, idx) => {
            if (ans === questions[idx].correct) {
                correctCount++;
            }
        });

        const percentage = (correctCount / questions.length) * 100;
        let level = 'A1';
        if (percentage >= 80) level = 'B2';
        else if (percentage >= 60) level = 'B1';
        else if (percentage >= 40) level = 'A2';

        console.log('📊 Nivel: ' + level + ' (' + percentage + '%)');

        // Guardar en BD
        try {
            await saveinitialTest(currentUser.id, level, Math.round(percentage));
            console.log('✅ Guardado en BD');
        } catch (error) {
            console.warn('⚠️ Error guardando:', error);
        }

        // Actualizar nivel del usuario
        try {
            await supabaseClient
                .from('users')
                .update({ nivel: level })
                .eq('id', currentUser.id);
            console.log('✅ Nivel actualizado');
        } catch (error) {
            console.warn('⚠️ Error actualizando nivel:', error);
        }

        // Mostrar resultados
        document.getElementById('testContainer').style.display = 'none';
        document.getElementById('resultsScreen').style.display = 'block';
        document.getElementById('estimatedLevel').textContent = level;

        setTimeout(() => {
            window.location.href = 'dashboard-student.html';
        }, 2000);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
