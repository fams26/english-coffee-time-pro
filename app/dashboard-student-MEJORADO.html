<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - English Coffee Time Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-A1: #FF6B6B;
            --color-A2: #FFA500;
            --color-B1: #4ECDC4;
            --color-B2: #45B7D1;
            --color-C1: #667BC6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #2c3e50;
        }

        .header {
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            color: white;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #ecf0f1;
            border-top: 4px solid #667BC6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .user-info {
            text-align: right;
        }

        .user-level {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            margin-bottom: 0.5rem;
        }

        .progress-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667BC6 0%, #45B7D1 100%);
            transition: width 0.3s ease;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .module-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .module-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .module-header {
            padding: 1.5rem;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .module-header.Grammar { background-color: var(--color-A1); }
        .module-header.Reading { background-color: var(--color-A2); }
        .module-header.Writing { background-color: var(--color-B1); }
        .module-header.Listening { background-color: var(--color-B2); }
        .module-header.Speaking { background-color: var(--color-C1); }
        .module-header.Vocabulary { background-color: var(--color-A1); }

        .module-content {
            padding: 1.5rem;
        }

        .competencies-list {
            margin-bottom: 1rem;
        }

        .competency-item {
            background: #f8f9fa;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.4rem;
            border-radius: 4px;
            font-size: 0.9rem;
            border-left: 3px solid #667BC6;
        }

        .module-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem 1.5rem;
        }

        .competency-count {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .view-btn {
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .view-btn:hover {
            opacity: 0.9;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div>
            <h1>☕ English Coffee Time Pro</h1>
        </div>
        <div class="user-info">
            <div>Bienvenido, <strong id="userName">Usuario</strong></div>
            <div class="user-level">Nivel: <span id="userLevel">Cargando...</span></div>
            <button class="logout-btn" onclick="logout()">👋 Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <!-- Loading -->
        <div id="loadingScreen" class="loading">
            <div class="spinner"></div>
            <p>Cargando tu dashboard...</p>
        </div>

        <!-- Content -->
        <div id="mainContent" style="display: none;">
            <!-- Progress -->
            <div class="progress-section">
                <h2>📊 Tu Progreso</h2>
                <div style="margin-top: 1rem;">
                    <div class="progress-label">
                        <span>Competencias completadas</span>
                        <span id="totalProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="totalProgressBar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- Modules -->
            <h2 class="section-title">🎓 Tus Módulos (Nivel <span id="levelDisplay">A1</span>)</h2>
            <div class="modules-grid" id="modulesContainer">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <!-- Error -->
        <div id="errorScreen" style="display: none;">
            <div class="error">
                <h3>⚠️ Error cargando dashboard</h3>
                <p id="errorMessage" style="margin-top: 0.5rem;"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>

    <script>
        console.log('✅ dashboard-student-MEJORADO.html cargado');

        // Currículo CEFR completo
        const CURRICULUM = {
            A1: {
                name: 'A1 - Elemental',
                modules: {
                    Grammar: ['Present Simple', 'To Be', 'Pronouns', 'Articles', 'Plural'],
                    Reading: ['Keywords', 'Short Phrases', 'Basic Instructions', 'Personal Info', 'Short Descriptions'],
                    Writing: ['Copy Words', 'Simple Sentences', 'Personal Data', 'Greetings', 'Simple Lists', 'Postcards'],
                    Listening: ['Isolated Words', 'Numbers', 'Short Instructions', 'Greetings', 'Simple Announcements', 'Simple Dialogues'],
                    Speaking: ['Basic Pronunciation', 'Self Introduction', 'Simple Questions', 'Numbers', 'Simple Instructions', 'Short Answers'],
                    Vocabulary: ['Colors', 'Numbers', 'Family', 'Professions', 'Food', 'Clothing', 'Places', 'Time']
                }
            },
            A2: {
                name: 'A2 - Elemental Superior',
                modules: {
                    Grammar: ['Past Simple Regular', 'Past Simple Irregular', 'Present Continuous', 'There is/are', 'Can/Could', 'Some/Any', 'Comparatives', 'Prepositions'],
                    Reading: ['Informal Emails', 'Short Stories', 'Menus', 'Advertising', 'Schedules', 'Person Description', 'Reviews'],
                    Writing: ['Simple Emails', 'Paragraphs', 'Descriptions', 'Place Description', 'Postcards', 'Routines'],
                    Listening: ['Familiar Conversations', 'Clear Instructions', 'Announcements', 'Oral Descriptions', 'Dates', 'Dialogues'],
                    Speaking: ['Personal Conversation', 'Past Experiences', 'Future Plans', 'Shopping', 'Directions', 'Opinions'],
                    Vocabulary: ['Weather', 'Pets', 'Sports', 'Furniture', 'Travel', 'Emotions', 'Money', 'Health']
                }
            },
            B1: {
                name: 'B1 - Intermedio',
                modules: {
                    Grammar: ['Present Perfect Simple', 'Present Perfect Continuous', 'First Conditional', 'Modal Verbs', 'Passive Voice', 'Reported Speech', 'Relative Clauses', 'Connectors'],
                    Reading: ['News Articles', 'Opinion Essays', 'Interviews', 'Product Descriptions', 'Literature', 'Formal Emails'],
                    Writing: ['Persuasive Essays', 'Formal Letters', 'Event Descriptions', 'Connected Paragraphs', 'Summaries', 'Instructions'],
                    Listening: ['Semi-structured Interviews', 'Presentations', 'Films with Subtitles', 'Phone Messages', 'Complex Instructions', 'Natural Dialogues'],
                    Speaking: ['Personal Presentations', 'Arguments', 'Storytelling', 'Clarification', 'Negotiations', 'Emotions'],
                    Vocabulary: ['Current Topics', 'Education', 'Relationships', 'Business', 'Phrasal Verbs']
                }
            },
            B2: {
                name: 'B2 - Intermedio-Alto',
                modules: {
                    Grammar: ['Second Conditional', 'Advanced Passive', 'Advanced Modals', 'Advanced Reported Speech', 'Inverted Sentences', 'Mixed Conditionals', 'Gerunds/Infinitives', 'Conjunctions'],
                    Reading: ['Specialized Articles', 'Classic Literature', 'Critical Analysis', 'Formal Documents', 'Persuasive Texts'],
                    Writing: ['Professional Reports', 'Argumentative Essays', 'Formal Correspondence', 'Text Revision', 'Paraphrasing', 'Creative Writing'],
                    Listening: ['Complete Lectures', 'Films without Subtitles', 'Specialized Podcasts', 'In-depth Interviews', 'Debates', 'Diverse Accents'],
                    Speaking: ['Formal Presentations', 'Argumentative Debate', 'Professional Negotiation', 'Nuances', 'Improvisation', 'Creative Presentations'],
                    Vocabulary: ['Advanced Collocations', 'Synonyms/Antonyms', 'Idioms', 'Academic', 'Professional']
                }
            }
        };

        let currentUser = null;
        let userLevel = null;

        async function init() {
            try {
                const isAuth = await supabaseIsAuthenticated();
                if (!isAuth) {
                    window.location.href = 'signin.html';
                    return;
                }

                currentUser = await supabaseGetCurrentUser();
                if (!currentUser) {
                    window.location.href = 'signin.html';
                    return;
                }

                console.log('👤 Usuario:', currentUser.email, 'Nivel:', currentUser.nivel);

                userLevel = currentUser.nivel || 'A1';

                if (!currentUser.nivel) {
                    window.location.href = 'initial-test.html';
                    return;
                }

                render();
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch (error) {
                console.error('❌ Error:', error);
                showError(error.message);
            }
        }

        function render() {
            const levelData = CURRICULUM[userLevel];

            document.getElementById('userName').textContent = currentUser.name || currentUser.email;
            document.getElementById('userLevel').textContent = userLevel;
            document.getElementById('levelDisplay').textContent = userLevel;

            // Progreso
            let totalCompetencies = 0;
            Object.values(levelData.modules).forEach(competencies => {
                totalCompetencies += competencies.length;
            });

            document.getElementById('totalProgress').textContent = '0%';
            document.getElementById('totalProgressBar').style.width = '0%';

            // Módulos
            const container = document.getElementById('modulesContainer');
            container.innerHTML = '';

            const moduleOrder = ['Grammar', 'Reading', 'Writing', 'Listening', 'Speaking', 'Vocabulary'];

            moduleOrder.forEach(moduleType => {
                const competencies = levelData.modules[moduleType];
                
                const card = document.createElement('div');
                card.className = 'module-card';

                let competenciesHTML = competencies.map(c => 
                    `<div class="competency-item">✓ ${c}</div>`
                ).join('');

                card.innerHTML = `
                    <div class="module-header ${moduleType}">
                        ${moduleType}
                    </div>
                    <div class="module-content">
                        <div class="competencies-list">
                            ${competenciesHTML}
                        </div>
                    </div>
                    <div class="module-footer">
                        <span class="competency-count">${competencies.length} temas</span>
                        <button class="view-btn" onclick="viewModule('${moduleType}')">
                            Ver →
                        </button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function viewModule(moduleType) {
            console.log('📖 Ver módulo:', moduleType);
            alert(`Módulo: ${moduleType}\n\nTemas: ${CURRICULUM[userLevel].modules[moduleType].join(', ')}`);
        }

        async function logout() {
            console.log('👋 Cerrando sesión...');
            await supabaseSignOut();
            window.location.href = 'signin.html';
        }

        function showError(message) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('errorScreen').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
