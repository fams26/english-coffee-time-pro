<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - English Coffee Time</title>
    <style>
        :root {
            --primary: #2C5282;
            --accent: #D4AF37;
            --bg: #F8F7F3;
            --text-dark: #1F2937;
            --text-light: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 1rem;
        }

        .header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.1);
        }

        input:disabled {
            background: #f3f4f6;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: #1e3a5f;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(44, 82, 130, 0.2);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error {
            background: #fee2e2;
            color: #EF4444;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #EF4444;
            font-size: 14px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #16a34a;
            font-size: 14px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .loading {
            text-align: center;
            display: none;
            padding: 1rem;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 14px;
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo">☕</div>
        <h1>English Coffee Time</h1>
        <p>Inicia sesión para continuar</p>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="email">Email</label>
            <input 
                type="email" 
                id="email" 
                placeholder="tu@email.com"
                required
            >
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input 
                type="password" 
                id="password" 
                placeholder="••••••••"
                required
            >
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Autenticando...</p>
        </div>

        <button type="submit" class="btn" id="submitBtn">
            Inicia Sesión
        </button>
    </form>

    <div class="links">
        <p>¿No tienes cuenta? <a href="signup.html">Crea una aquí</a></p>
        <p style="margin-top: 1rem;"><a href="index.html">← Volver al inicio</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = 'https://yddwapikukyiwzwxbpkb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkZHdhcGlrdWt5aXd6d3hicGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzEyMDMsImV4cCI6MjA5NjAwNzIwM30.QfE53nsb-VTUfGEOSuS-6Bks5GSlFYyXaeppwgBNXN4';

    const { createClient } = window.supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Verificar si ya está logged in
    window.addEventListener('load', async () => {
        const { data } = await supabaseClient.auth.getSession();
        if (data.session) {
            console.log('👤 Ya tiene sesión, redirigiendo...');
            window.location.href = 'app/dashboard-student.html';
        }
    });

    async function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showError('Completa todos los campos');
            return;
        }

        showLoading(true);
        clearError();

        try {
            console.log('🔐 Intentando login:', email);

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                console.error('❌ Error:', error.message);
                showError('Email o contraseña incorrectos');
                showLoading(false);
                return;
            }

            console.log('✅ Login exitoso');
            showSuccess('¡Login exitoso! Redirigiendo al dashboard...');

            // REDIRIGIR AUTOMÁTICAMENTE AL DASHBOARD
            setTimeout(() => {
                window.location.href = 'app/dashboard-student.html';
            }, 1500);

        } catch (error) {
            console.error('❌ Error:', error.message);
            showError('Error inesperado: ' + error.message);
            showLoading(false);
        }
    }

    function showError(message) {
        const div = document.getElementById('errorMsg');
        const success = document.getElementById('successMsg');
        div.textContent = message;
        div.classList.add('show');
        success.classList.remove('show');
    }

    function showSuccess(message) {
        const div = document.getElementById('successMsg');
        const error = document.getElementById('errorMsg');
        div.textContent = message;
        div.classList.add('show');
        error.classList.remove('show');
    }

    function clearError() {
        document.getElementById('errorMsg').classList.remove('show');
    }

    function showLoading(show) {
        const loading = document.getElementById('loading');
        const btn = document.getElementById('submitBtn');

        if (show) {
            loading.style.display = 'block';
            btn.disabled = true;
        } else {
            loading.style.display = 'none';
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
