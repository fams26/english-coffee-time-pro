<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - English Coffee Time Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-A1: #FF6B6B;
            --color-A2: #FFA500;
            --color-B1: #4ECDC4;
            --color-B2: #45B7D1;
            --color-C1: #667BC6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #2c3e50;
        }

        .header {
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            color: white;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #ecf0f1;
            border-top: 4px solid #667BC6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .user-info {
            text-align: right;
        }

        .user-level {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            margin-bottom: 0.5rem;
        }

        .progress-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667BC6 0%, #45B7D1 100%);
            transition: width 0.3s ease;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .module-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .module-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .module-header {
            padding: 1.5rem;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .module-icon {
            font-size: 2rem;
        }

        .module-header.Grammar { background-color: var(--color-A1); }
        .module-header.Reading { background-color: var(--color-A2); }
        .module-header.Writing { background-color: var(--color-B1); }
        .module-header.Listening { background-color: var(--color-B2); }
        .module-header.Speaking { background-color: var(--color-C1); }
        .module-header.Vocabulary { background-color: var(--color-A1); }

        .module-content {
            padding: 1.5rem;
            min-height: 150px;
            display: flex;
            flex-direction: column;
        }

        .competencies-list {
            flex: 1;
            margin-bottom: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .competency-item {
            background: #f8f9fa;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            border-radius: 6px;
            font-size: 0.9rem;
            border-left: 3px solid #667BC6;
            line-height: 1.4;
        }

        .competency-item strong {
            display: block;
            margin-bottom: 0.3rem;
            color: #2c3e50;
        }

        .competency-item small {
            color: #7f8c8d;
            display: block;
        }

        .module-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-top: 1px solid #ecf0f1;
        }

        .competency-count {
            color: #7f8c8d;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .view-btn {
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .view-btn:hover {
            opacity: 0.9;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
        }

        .empty-state p {
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .user-info {
                text-align: center;
            }

            .module-header {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div>
            <h1>☕ English Coffee Time Pro</h1>
        </div>
        <div class="user-info">
            <div>Bienvenido, <strong id="userName">Usuario</strong></div>
            <div class="user-level">Nivel: <span id="userLevel">Cargando...</span></div>
            <button class="logout-btn" onclick="logout()">👋 Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <!-- Loading -->
        <div id="loadingScreen" class="loading">
            <div class="spinner"></div>
            <p>Cargando tu dashboard...</p>
        </div>

        <!-- Content -->
        <div id="mainContent" style="display: none;">
            <!-- Progress -->
            <div class="progress-section">
                <h2>📊 Tu Progreso</h2>
                <div style="margin-top: 1rem;">
                    <div class="progress-label">
                        <span>Competencias completadas</span>
                        <span id="totalProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="totalProgressBar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- Modules -->
            <h2 class="section-title">🎓 Tus Módulos (Nivel <span id="levelDisplay">A1</span>)</h2>
            <div class="modules-grid" id="modulesContainer">
                <!-- Se llena dinámicamente desde Supabase -->
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <p>📚 No hay módulos disponibles en este momento</p>
            </div>
        </div>

        <!-- Error -->
        <div id="errorScreen" style="display: none;">
            <div class="error">
                <h3>⚠️ Error cargando dashboard</h3>
                <p id="errorMessage" style="margin-top: 0.5rem;"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>

    <script>
        console.log('✅ dashboard-student-DINAMICO.html cargado');

        // Iconos para cada módulo
        const MODULE_ICONS = {
            Grammar: '📝',
            Reading: '📖',
            Writing: '✍️',
            Listening: '🎧',
            Speaking: '🗣️',
            Vocabulary: '📚'
        };

        let currentUser = null;
        let userLevel = null;
        let modules = {};

        async function init() {
            try {
                const isAuth = await supabaseIsAuthenticated();
                if (!isAuth) {
                    window.location.href = 'signin.html';
                    return;
                }

                currentUser = await supabaseGetCurrentUser();
                if (!currentUser) {
                    window.location.href = 'signin.html';
                    return;
                }

                console.log('👤 Usuario:', currentUser.email, 'Nivel:', currentUser.nivel);

                userLevel = currentUser.nivel || 'A1';

                if (!currentUser.nivel) {
                    window.location.href = 'initial-test.html';
                    return;
                }

                // Cargar competencias desde Supabase
                await loadCompetencies();
                render();

                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';

            } catch (error) {
                console.error('❌ Error:', error);
                showError(error.message);
            }
        }

        async function loadCompetencies() {
            console.log(`📥 Cargando competencias para nivel ${userLevel}...`);

            try {
                const { data, error } = await supabaseClient
                    .from('competencies')
                    .select('*')
                    .eq('nivel', userLevel)
                    .order('modulo')
                    .order('orden');

                if (error) throw error;

                if (!data || data.length === 0) {
                    console.warn('⚠️ No hay competencias para nivel', userLevel);
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                // Agrupar por módulo
                modules = {};
                data.forEach(comp => {
                    if (!modules[comp.modulo]) {
                        modules[comp.modulo] = [];
                    }
                    modules[comp.modulo].push(comp);
                });

                console.log('✅ Competencias cargadas:', Object.keys(modules));

            } catch (error) {
                console.error('❌ Error cargando competencias:', error);
                throw error;
            }
        }

        function render() {
            // Actualizar info del usuario
            document.getElementById('userName').textContent = currentUser.name || currentUser.email;
            document.getElementById('userLevel').textContent = userLevel;
            document.getElementById('levelDisplay').textContent = userLevel;

            // Progreso (placeholder)
            document.getElementById('totalProgress').textContent = '0%';
            document.getElementById('totalProgressBar').style.width = '0%';

            // Renderizar módulos
            const container = document.getElementById('modulesContainer');
            container.innerHTML = '';

            // Orden de módulos
            const moduleOrder = ['Grammar', 'Reading', 'Writing', 'Listening', 'Speaking', 'Vocabulary'];

            moduleOrder.forEach(moduleType => {
                const competencies = modules[moduleType];
                
                if (!competencies) {
                    console.log(`⏭️  Saltando ${moduleType} - no hay competencias`);
                    return;
                }

                const card = document.createElement('div');
                card.className = 'module-card';

                // Mostrar primeras 3 competencias en preview
                const previewCompetencies = competencies.slice(0, 3);
                let competenciesHTML = previewCompetencies.map(c => `
                    <div class="competency-item">
                        <strong>${c.competencia}</strong>
                        <small>${c.descriptores ? c.descriptores.substring(0, 60) + '...' : ''}</small>
                    </div>
                `).join('');

                if (competencies.length > 3) {
                    competenciesHTML += `
                        <div class="competency-item" style="font-style: italic; border-left-color: #bbb;">
                            <small>+${competencies.length - 3} más...</small>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="module-header ${moduleType}">
                        <div>${moduleType}</div>
                        <div class="module-icon">${MODULE_ICONS[moduleType] || '📚'}</div>
                    </div>
                    <div class="module-content">
                        <div class="competencies-list">
                            ${competenciesHTML}
                        </div>
                    </div>
                    <div class="module-footer">
                        <span class="competency-count">${competencies.length} temas</span>
                        <button class="view-btn" onclick="viewModule('${moduleType}')">
                            Ver →
                        </button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function viewModule(moduleType) {
            const competencies = modules[moduleType];
            if (!competencies) {
                alert('No hay competencias para este módulo');
                return;
            }

            console.log(`📖 Ver módulo: ${moduleType}`);
            console.log(`Competencias:`, competencies);

            // Por ahora mostrar alert, luego navegará a una página de módulo
            const competencyNames = competencies.map(c => `• ${c.competencia}`).join('\n');
            alert(`Módulo: ${moduleType}\n\nTemas (${competencies.length}):\n\n${competencyNames}`);
        }

        async function logout() {
            console.log('👋 Cerrando sesión...');
            await supabaseSignOut();
            window.location.href = 'signin.html';
        }

        function showError(message) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('errorScreen').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
