<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - English Coffee Time</title>
    <style>
        :root {
            --primary: #2C5282;
            --accent: #D4AF37;
            --bg: #F8F7F3;
            --text-dark: #1F2937;
            --text-light: #6B7280;
            --danger: #EF4444;
            --success: #10B981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 1rem;
        }

        .header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.1);
        }

        .form-group input:disabled {
            background: #f3f4f6;
            cursor: not-allowed;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover:not(:disabled) {
            background: #1e3a5f;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(44, 82, 130, 0.2);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--danger);
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #dcfce7;
            color: var(--success);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--success);
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 1rem;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 14px;
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .links a:hover {
            color: #1e3a5f;
            text-decoration: underline;
        }

        .divider {
            margin: 1.5rem 0;
            text-align: center;
            color: var(--text-light);
            font-size: 12px;
        }

        .divider:before {
            content: "";
            display: block;
            height: 1px;
            background: #e5e7eb;
            margin-bottom: 0.75rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }

            .card {
                padding: 1.5rem;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="logo">☕</div>
            <h1>English Coffee Time</h1>
            <p>Inicia sesión para continuar</p>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="tu@email.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                >
            </div>

            <!-- Loading State -->
            <div class="loading" id="loadingState">
                <div class="spinner"></div>
                <p>Autenticando...</p>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-login" id="submitBtn">
                Inicia Sesión
            </button>
        </form>

        <!-- Links -->
        <div class="divider">¿No tienes cuenta?</div>
        <div class="links">
            <a href="signup.html">Crea una nueva cuenta</a>
        </div>

        <div class="divider" style="margin: 1rem 0 0;">O</div>

        <div class="links" style="margin-top: 1rem;">
            <a href="index.html">← Volver al inicio</a>
        </div>

        <!-- Debug Info (opcional) -->
        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; font-size: 12px; color: var(--text-light); text-align: center;">
            <p>¿Problemas al iniciar sesión?</p>
            <p>Verifica que tu email y contraseña son correctos</p>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>

<script>
    /**
     * Manejar login
     */
    async function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Validaciones básicas
        if (!email || !password) {
            showError('Por favor completa todos los campos');
            return;
        }

        if (!email.includes('@')) {
            showError('Email no válido');
            return;
        }

        // Mostrar loading
        showLoading(true);
        clearMessages();

        try {
            // Intentar login
            console.log('🔐 Intentando login con:', email);
            const result = await supabaseSignIn(email, password);

            if (!result.success) {
                console.error('❌ Error de autenticación:', result.error);
                showError(result.error || 'Error al iniciar sesión. Verifica tu email y contraseña.');
                showLoading(false);
                return;
            }

            console.log('✅ Login exitoso');
            showSuccess('¡Login exitoso! Redirigiendo...');

            // Esperar 1 segundo y redirigir
            setTimeout(() => {
                window.location.href = 'app/dashboard-student.html';
            }, 1000);

        } catch (error) {
            console.error('❌ Error inesperado:', error);
            showError('Error inesperado: ' + error.message);
            showLoading(false);
        }
    }

    /**
     * Mostrar error
     */
    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.classList.add('show');
    }

    /**
     * Mostrar éxito
     */
    function showSuccess(message) {
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = message;
        successDiv.classList.add('show');
    }

    /**
     * Limpiar mensajes
     */
    function clearMessages() {
        document.getElementById('errorMessage').classList.remove('show');
        document.getElementById('successMessage').classList.remove('show');
    }

    /**
     * Mostrar/ocultar loading
     */
    function showLoading(show) {
        const loading = document.getElementById('loadingState');
        const btn = document.getElementById('submitBtn');

        if (show) {
            loading.style.display = 'block';
            btn.disabled = true;
        } else {
            loading.style.display = 'none';
            btn.disabled = false;
        }
    }

    /**
     * Verificar si ya está autenticado
     */
    document.addEventListener('DOMContentLoaded', async () => {
        const isAuth = await supabaseIsAuthenticated();
        if (isAuth) {
            console.log('👤 Ya está autenticado, redirigiendo...');
            window.location.href = 'app/dashboard-student.html';
        }
    });

    // Debug: Log cuando se carga
    console.log('📄 signin.html cargado');
</script>

</body>
</html>
