<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - English Coffee Time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            color: #667BC6;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667BC6;
            box-shadow: 0 0 0 3px rgba(102, 123, 198, 0.1);
        }

        .form-group input::placeholder {
            color: #b0b9c6;
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #7f8c8d;
        }

        .signup-link a {
            color: #667BC6;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 0.9rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 0.9rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667BC6;
            margin-top: 1rem;
        }

        .spinner {
            border: 2px solid #f0f0f0;
            border-top: 2px solid #667BC6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1>☕ English Coffee Time</h1>
        <p>Ingresa a tu plataforma de aprendizaje</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="email">Email</label>
            <input 
                type="email" 
                id="email" 
                placeholder="tu@email.com" 
                required
                autocomplete="email"
            >
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input 
                type="password" 
                id="password" 
                placeholder="••••••••" 
                required
                autocomplete="current-password"
            >
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            Ingresar
        </button>
    </form>

    <div class="loading" id="loadingIndicator">
        <div class="spinner"></div>
        <p>Autenticando...</p>
    </div>

    <div class="signup-link">
        ¿No tienes cuenta? <a href="signup.html">Regístrate aquí</a>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>

<script>
    console.log('📄 Sign In cargado');

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const loadingIndicator = document.getElementById('loadingIndicator');

    async function handleLogin(event) {
        event.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        console.log('🔐 Intentando login:', email);

        // Mostrar loading
        loginBtn.disabled = true;
        loadingIndicator.style.display = 'block';
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';

        try {
            // Usar función global de supabase-client.js
            const result = await supabaseSignIn(email, password);

            if (result.success) {
                console.log('✅ Login exitoso');
                successMessage.textContent = '✅ Ingreso exitoso. Redirigiendo...';
                successMessage.style.display = 'block';
                
                // Esperar 1 segundo y redirigir
                setTimeout(() => {
                    window.location.href = 'dashboard-student.html';
                }, 1000);
            } else {
                console.error('❌ Error de login:', result.error);
                errorMessage.textContent = '❌ ' + (result.error || 'Error al ingresar');
                errorMessage.style.display = 'block';
                loginBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        } catch (error) {
            console.error('❌ Error inesperado:', error.message);
            errorMessage.textContent = '❌ Error: ' + error.message;
            errorMessage.style.display = 'block';
            loginBtn.disabled = false;
            loadingIndicator.style.display = 'none';
        }
    }

    // Verificar si ya está autenticado
    (async () => {
        console.log('🔍 Verificando autenticación...');
        const isAuth = await supabaseIsAuthenticated();
        if (isAuth) {
            console.log('✅ Ya está autenticado, redirigiendo...');
            window.location.href = 'dashboard-student.html';
        }
    })();
</script>

</body>
</html>
