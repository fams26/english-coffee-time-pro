<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - English Coffee Time Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #2c3e50;
        }
        .header {
            background: linear-gradient(135deg, #667BC6 0%, #45B7D1 100%);
            color: white;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .header h1 { font-size: 2rem; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #ecf0f1;
            border-top: 4px solid #667BC6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .module {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 4px solid #667BC6;
        }
        .module h3 { color: #667BC6; margin-bottom: 0.5rem; }
        .module p { color: #7f8c8d; font-size: 0.9rem; }
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>☕ English Coffee Time Pro</h1>
        </div>
        <div style="text-align: right;">
            <div style="margin-bottom: 1rem;">
                <div>Bienvenido, <strong id="userName">Usuario</strong></div>
                <div style="font-size: 0.9rem; opacity: 0.9;">Nivel: <span id="userLevel">Cargando...</span></div>
            </div>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <div id="loadingScreen" class="loading">
            <div class="spinner"></div>
            <p>Cargando dashboard...</p>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="card">
                <h2>Tu Progreso</h2>
                <div style="margin-top: 1rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Completado</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div style="height: 12px; background: #ecf0f1; border-radius: 10px; overflow: hidden;">
                        <div id="progressBar" style="height: 100%; background: linear-gradient(90deg, #667BC6 0%, #45B7D1 100%); width: 0%; transition: width 0.3s;"></div>
                    </div>
                </div>
            </div>

            <h2 style="margin-bottom: 1.5rem;">Tus Módulos</h2>
            <div class="modules-grid" id="modulesContainer">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <div id="errorScreen" style="display: none;">
            <div class="error">
                <h3>⚠️ Error cargando dashboard</h3>
                <p id="errorMessage" style="margin-top: 0.5rem;"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>

    <script>
        console.log('✅ dashboard-student.html cargado');

        const CURRICULUM = {
            A1: { name: 'A1 - Elemental', modules: ['Grammar', 'Reading', 'Writing', 'Listening', 'Speaking', 'Vocabulary'] },
            A2: { name: 'A2 - Elemental', modules: ['Grammar', 'Reading', 'Writing', 'Listening', 'Speaking', 'Vocabulary'] },
            B1: { name: 'B1 - Intermedio', modules: ['Grammar', 'Reading', 'Writing', 'Listening', 'Speaking', 'Vocabulary'] },
            B2: { name: 'B2 - Intermedio-Alto', modules: ['Grammar', 'Reading', 'Writing', 'Listening', 'Speaking', 'Vocabulary'] },
            C1: { name: 'C1 - Avanzado', modules: ['Grammar', 'Reading', 'Writing', 'Listening', 'Speaking', 'Vocabulary'] }
        };

        let currentUser = null;

        async function init() {
            try {
                const isAuth = await supabaseIsAuthenticated();
                if (!isAuth) {
                    window.location.href = 'signin.html';
                    return;
                }

                currentUser = await supabaseGetCurrentUser();
                if (!currentUser) {
                    window.location.href = 'signin.html';
                    return;
                }

                console.log('👤 Usuario:', currentUser.email, 'Nivel:', currentUser.nivel);

                if (!currentUser.nivel) {
                    window.location.href = 'initial-test.html';
                    return;
                }

                render();
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('errorScreen').style.display = 'block';
                document.getElementById('errorMessage').textContent = error.message;
            }
        }

        function render() {
            const level = currentUser.nivel;
            const levelData = CURRICULUM[level];

            document.getElementById('userName').textContent = currentUser.name || currentUser.email;
            document.getElementById('userLevel').textContent = level;

            const container = document.getElementById('modulesContainer');
            container.innerHTML = '';

            if (levelData) {
                levelData.modules.forEach(module => {
                    const div = document.createElement('div');
                    div.className = 'module';
                    div.innerHTML = `
                        <h3>${module}</h3>
                        <p>${level} - ${module}</p>
                    `;
                    container.appendChild(div);
                });
            }

            document.getElementById('progressPercent').textContent = '0%';
            document.getElementById('progressBar').style.width = '0%';
        }

        async function logout() {
            await supabaseSignOut();
            window.location.href = 'signin.html';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
