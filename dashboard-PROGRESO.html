<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - English Coffee Time</title>
    <style>
        :root {
            --primary: #2C5282;
            --accent: #D4AF37;
            --bg: #F8F7F3;
            --text-dark: #1F2937;
            --text-light: #6B7280;
            --success: #10B981;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-dark);
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: var(--primary);
            font-size: 24px;
        }

        .navbar button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .header-section h2 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .user-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .info-card {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
        }

        .info-label {
            color: var(--text-light);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .info-value {
            color: var(--primary);
            font-size: 24px;
            font-weight: 700;
        }

        .module-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent);
        }

        .module-title {
            color: var(--primary);
            font-size: 20px;
            font-weight: 700;
        }

        .module-progress-percent {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 700;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .topic-card {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.3s;
        }

        .topic-card:hover {
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .topic-card.completed {
            border-color: var(--success);
            background: #f0fdf4;
        }

        .topic-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f3f4f6;
        }

        .topic-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 14px;
        }

        .status-icon {
            font-size: 20px;
        }

        .topic-name {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .topic-description {
            font-size: 13px;
            color: var(--text-light);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-light);
        }

        .level-status {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .level-status.completed {
            background: #f0fdf4;
            border-color: var(--success);
        }

        .level-status.in-progress {
            background: #fffbeb;
            border-color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid var(--bg);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .module-header {
                flex-direction: column;
                gap: 1rem;
            }

            .topics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>☕ English Coffee Time</h1>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">
    <!-- HEADER -->
    <div class="header-section">
        <h2>Bienvenido, <span id="studentName">Usuario</span></h2>
        <div class="user-info">
            <div class="info-card">
                <div class="info-label">Tu Nivel</div>
                <div class="info-value" id="studentLevel">-</div>
            </div>
            <div class="info-card">
                <div class="info-label">Temas Completados</div>
                <div class="info-value" id="completedCount">0</div>
            </div>
            <div class="info-card">
                <div class="info-label">Progreso General</div>
                <div class="info-value" id="totalProgress">0%</div>
            </div>
        </div>
    </div>

    <!-- MÓDULOS Y TEMAS -->
    <div id="modulesContainer">
        <div class="loading">
            <div class="spinner"></div>
            <p>Cargando módulos...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = 'https://yddwapikukyiwzwxbpkb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkZHdhcGlrdWt5aXd6d3hicGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzEyMDMsImV4cCI6MjA5NjAwNzIwM30.QfE53nsb-VTUfGEOSuS-6Bks5GSlFYyXaeppwgBNXN4';

    const { createClient } = window.supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

    const NIVELES_ORDEN = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
        console.log('📄 Dashboard cargando...');
        
        currentUser = await supabaseGetCurrentUser();
        console.log('👤 Usuario:', currentUser);
        
        if (!currentUser) {
            window.location.href = '../signin.html';
            return;
        }

        await loadStudentInfo();
        await loadModulesWithProgress();
    });

    // ============================================
    // FUNCIONES SUPABASE
    // ============================================

    async function supabaseGetCurrentUser() {
        try {
            const { data } = await supabaseClient.auth.getSession();
            if (!data.session) return null;

            const user = data.session.user;
            const { data: userData } = await supabaseClient
                .from('users')
                .select('*')
                .eq('id', user.id)
                .single();

            return {
                id: user.id,
                email: user.email,
                name: userData?.name || 'Usuario',
                nivel: userData?.nivel || 'No asignado'
            };
        } catch (error) {
            console.error('Error:', error);
            return null;
        }
    }

    async function loadStudentInfo() {
        document.getElementById('studentName').textContent = currentUser.name;
        document.getElementById('studentLevel').textContent = currentUser.nivel;

        // Obtener estadísticas
        try {
            const { data: progress } = await supabaseClient
                .from('student_progress')
                .select('*')
                .eq('student_id', currentUser.id);

            if (progress) {
                const completed = progress.filter(p => p.completado).length;
                document.getElementById('completedCount').textContent = completed;
                
                const total = progress.length;
                const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
                document.getElementById('totalProgress').textContent = percent + '%';
            }
        } catch (error) {
            console.error('Error loading stats:', error);
        }
    }

    async function loadModulesWithProgress() {
        try {
            if (!currentUser.nivel) {
                document.getElementById('modulesContainer').innerHTML = 
                    '<div style="text-align: center; padding: 2rem; background: white; border-radius: 12px;">Necesitas completar el test primero</div>';
                return;
            }

            // Obtener módulos del nivel
            const { data: modules } = await supabaseClient
                .from('modules')
                .select('*')
                .eq('nivel', currentUser.nivel)
                .order('module_type');

            if (!modules || modules.length === 0) {
                document.getElementById('modulesContainer').innerHTML = 
                    '<div style="text-align: center; padding: 2rem; background: white; border-radius: 12px;">No hay módulos disponibles</div>';
                return;
            }

            let html = '';

            for (const module of modules) {
                // Obtener temas del módulo
                const { data: temas } = await supabaseClient
                    .from('module_topics')
                    .select('*')
                    .eq('module_id', module.id)
                    .order('orden');

                if (!temas) continue;

                // Obtener progreso del estudiante
                const { data: progreso } = await supabaseClient
                    .from('student_progress')
                    .select('*')
                    .eq('student_id', currentUser.id)
                    .in('topic_id', temas.map(t => t.id));

                const temasCompletados = progreso ? progreso.filter(p => p.completado).length : 0;
                const totalTemas = temas.length;
                const percentCompletado = Math.round((temasCompletados / totalTemas) * 100);

                const moduleIcons = {
                    'reading': '📖',
                    'grammar': '📝',
                    'vocabulary': '📚',
                    'listening': '🎧',
                    'writing': '✍️',
                    'speaking': '🗣️'
                };

                html += `
                    <div class="module-card">
                        <div class="module-header">
                            <h3 class="module-title">${moduleIcons[module.module_type] || '📚'} ${module.nombre}</h3>
                            <div class="module-progress-percent">${percentCompletado}% completo</div>
                        </div>

                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentCompletado}%"></div>
                        </div>
                        <div class="progress-text">${temasCompletados} de ${totalTemas} temas completados</div>

                        <div class="topics-grid" style="margin-top: 1.5rem;">
                `;

                for (const tema of temas) {
                    const temaProgreso = progreso ? progreso.find(p => p.topic_id === tema.id) : null;
                    const isCompleted = temaProgreso && temaProgreso.completado;
                    const statusIcon = isCompleted ? '✅' : '❌';
                    
                    html += `
                        <div class="topic-card ${isCompleted ? 'completed' : ''}" onclick="goToTopic('${tema.id}', '${module.id}')">
                            <div class="topic-status">
                                <span class="status-icon">${statusIcon}</span>
                                <span>${isCompleted ? 'Completado' : 'Pendiente'}</span>
                            </div>
                            <div class="topic-name">${tema.titulo}</div>
                            <div class="topic-description">${tema.descripcion || 'Aprende este tema'}</div>
                            ${isCompleted && temaProgreso.puntuacion ? `<div style="margin-top: 0.5rem; font-size: 12px; color: var(--success);">Puntuación: ${temaProgreso.puntuacion}%</div>` : ''}
                        </div>
                    `;
                }

                html += `</div></div>`;
            }

            document.getElementById('modulesContainer').innerHTML = html;
            console.log('✅ Módulos cargados');

        } catch (error) {
            console.error('❌ Error loading modules:', error);
            document.getElementById('modulesContainer').innerHTML = 
                '<div style="color: red; padding: 2rem;">Error cargando módulos</div>';
        }
    }

    function goToTopic(topicId, moduleId) {
        window.location.href = `topic-viewer.html?topic_id=${topicId}&module_id=${moduleId}`;
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = '../signin.html';
    }
</script>

</body>
</html>
